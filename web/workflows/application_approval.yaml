name: application_approval
version: "1.0"
description: Automated application approval workflow with retry and manual review branches.
input_schema:
  fields:
    applicant_id:
      type: string
      required: true
    applicant_name:
      type: string
      required: true
    requested_amount:
      type: number
      required: true
      minimum: 1
      maximum: 250000
    monthly_income:
      type: number
      required: true
      minimum: 1
    credit_score:
      type: integer
      required: true
      minimum: 300
      maximum: 900
    employment_type:
      type: string
      required: true
      enum:
        - salaried
        - self_employed
        - contractor
    dependency_mode:
      type: string
      required: false
      enum:
        - pass
        - fail
        - transient_error
stages:
  - id: intake
    name: Intake Validation
    rules:
      - id: amount_in_auto_lane
        type: threshold
        field: requested_amount
        operator: lte
        value: 200000
        reason: Requests above 200000 move to manual review.
        data_refs:
          - requested_amount
        on_fail: manual_review
  - id: risk_screening
    name: Risk Screening
    rules:
      - id: baseline_credit
        type: threshold
        field: credit_score
        operator: gte
        value: 700
        reason: Credit scores below 700 require manual review.
        data_refs:
          - credit_score
        on_fail: manual_review
      - id: self_employed_income_buffer
        type: threshold
        field: monthly_income
        operator: gte
        value: 12000
        run_if:
          field: employment_type
          operator: eq
          value: self_employed
        reason: Self-employed applicants need stronger monthly income.
        data_refs:
          - employment_type
          - monthly_income
        on_fail: reject
  - id: external_checks
    name: External Checks
    rules:
      - id: fraud_screen
        type: dependency
        dependency: fraud_service
        reason: External fraud screening must clear automated decisions.
        data_refs:
          - applicant_id
          - dependency_mode
        on_fail: reject
        on_dependency_error: retry
  - id: final_decision
    name: Final Decision
    rules:
      - id: affordability_ratio
        type: ratio_threshold
        numerator_field: monthly_income
        denominator_field: requested_amount
        operator: gte
        value: 0.05
        reason: Monthly income must be at least five percent of requested amount.
        data_refs:
          - monthly_income
          - requested_amount
        on_fail: manual_review
