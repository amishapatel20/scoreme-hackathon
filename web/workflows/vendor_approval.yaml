name: vendor_approval
version: "1.0"
description: Vendor onboarding workflow demonstrating another business use case with the same engine.
input_schema:
  fields:
    vendor_id:
      type: string
      required: true
    vendor_name:
      type: string
      required: true
    annual_contract_value:
      type: number
      required: true
      minimum: 1
    years_in_business:
      type: integer
      required: true
      minimum: 0
    compliance_status:
      type: string
      required: true
      enum:
        - verified
        - pending
        - failed
stages:
  - id: intake
    name: Intake Validation
    rules:
      - id: compliance_gate
        type: equals
        field: compliance_status
        operator: eq
        value: verified
        reason: Only compliance-verified vendors can be auto-approved.
        data_refs:
          - compliance_status
        on_fail: manual_review
  - id: risk_screening
    name: Commercial Screening
    rules:
      - id: high_value_vendor
        type: threshold
        field: annual_contract_value
        operator: lte
        value: 500000
        reason: High-value vendors require manual review.
        data_refs:
          - annual_contract_value
        on_fail: manual_review
      - id: business_maturity
        type: threshold
        field: years_in_business
        operator: gte
        value: 2
        reason: Vendors with fewer than two years in business are rejected.
        data_refs:
          - years_in_business
        on_fail: reject